<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandin 莽職聞盲赂聥盲赂聙忙颅楼</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f4; color: #1c1917; padding: 24px 16px; min-height: 100vh; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #78716c; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px 0; color: #a8a29e; font-size: 13px; }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #dc2626; font-size: 13px; margin-bottom: 16px; }
  .project-group { margin-bottom: 20px; }
  .project-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #78716c; margin-bottom: 8px; padding-left: 4px; }
  .todo-card { background: #fff; border-radius: 10px; margin-bottom: 6px; border: 1px solid #e7e5e4; overflow: hidden; transition: box-shadow 0.15s; }
  .todo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .todo-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .todo-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.4; }
  .priority-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; flex-shrink: 0; }
  .chevron { font-size: 12px; color: #a8a29e; transition: transform 0.2s; flex-shrink: 0; }
  .todo-card.open .chevron { transform: rotate(180deg); }
  .todo-context { display: none; padding: 12px 16px 14px 38px; font-size: 13px; color: #57534e; line-height: 1.6; border-top: 1px solid #f5f5f4; }
  .todo-card.open .todo-context { display: block; }
  .session-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .context-text p { margin-bottom: 8px; }
  .context-text p:last-child { margin-bottom: 0; }
  .meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; }
  .meta-link { color: #2563eb; text-decoration: none; }
  .meta-link:hover { text-decoration: underline; }
  .meta-loc { color: #78716c; }
  .notes-wrap { margin-top: 8px; background: #fafaf9; border-left: 3px solid #e7e5e4; padding: 6px 10px; font-size: 12px; color: #57534e; border-radius: 0 4px 4px 0; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .done-btn, .bottom-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: #78716c; background: #f5f5f4; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .done-btn:hover, .bottom-btn:hover { background: #e7e5e4; color: #1c1917; }
  .done-btn:disabled, .bottom-btn:disabled { opacity: 0.5; cursor: default; }
  .priority-wrap { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #78716c; margin-left: auto; }
  .priority-wrap label { font-size: 11px; }
  .priority-select { font-size: 12px; padding: 3px 6px; border: 1px solid #e7e5e4; border-radius: 6px; background: #fff; color: #1c1917; cursor: pointer; }
  .todo-card.done { opacity: 0.45; }
  .todo-card.done .todo-title { text-decoration: line-through; color: #a8a29e; }
  .progress-bar-wrap { background: #e7e5e4; border-radius: 99px; height: 4px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: #292524; transition: width 0.4s; }
  .progress-label { font-size: 11px; color: #78716c; margin-bottom: 6px; }
  .show-done-btn { font-size: 12px; color: #a8a29e; background: none; border: none; cursor: pointer; padding: 8px 0; display: block; margin: 0 auto; }
  .show-done-btn:hover { color: #78716c; }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 16px; padding: 10px 14px; background: #fff; border: 1px solid #e7e5e4; border-radius: 10px; }
  .filter-label { font-size: 11px; font-weight: 600; color: #a8a29e; text-transform: uppercase; letter-spacing: 0.06em; }
  .filter-sep { width: 1px; height: 16px; background: #e7e5e4; margin: 0 4px; }
  .f-btn { font-size: 11px; font-weight: 500; padding: 4px 10px; border: 1px solid #e7e5e4; border-radius: 99px; background: #fff; color: #57534e; cursor: pointer; transition: all 0.1s; }
  .f-btn:hover { background: #f5f5f4; }
  .f-btn.active { background: #1c1917; color: #fff; border-color: #1c1917; }
</style>
</head>
<body>
<h1>Brandin 莽職聞盲赂聥盲赂聙忙颅楼</h1>
<p class="subtitle" id="subtitle">猫录聣氓聟楼盲赂颅芒聙娄</p>
<div class="progress-label" id="progress-text"></div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
<div class="filter-bar" id="filter-bar" style="display:none">
  <span class="filter-label">忙聨聮氓潞聫</span>
  <button class="f-btn active" data-sort="none">氓聨聼茅聽聠氓潞聫</button>
  <button class="f-btn" data-sort="desc">茅聡聧猫娄聛忙聙搂 茅芦聵芒聠聮盲陆聨</button>
  <button class="f-btn" data-sort="asc">茅聡聧猫娄聛忙聙搂 盲陆聨芒聠聮茅芦聵</button>
  <div class="filter-sep"></div>
  <span class="filter-label">茅隆炉莽陇潞</span>
  <button class="f-btn active" data-min="0">氓聟篓茅聝篓</button>
  <button class="f-btn" data-min="2">盲赂颅盲禄楼盲赂聤</button>
  <button class="f-btn" data-min="3">茅芦聵</button>
</div>
<div id="error-area"></div>
<div id="todo-list"><div class="loading">忙颅拢氓聹篓氓戮聻 Supabase 猫庐聙氓聫聳猫鲁聡忙聳聶芒聙娄</div></div>
<button class="show-done-btn" id="toggle-done-btn" style="display:none">茅隆炉莽陇潞氓路虏氓庐聦忙聢聬茅聽聟莽聸庐</button>
<script>
const SUPABASE_URL="https://hwlbadvxnsppojaoqkeh.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3bGJhZHZ4bnNwcG9qYW9xa2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzgyOTgsImV4cCI6MjA5NzQ1NDI5OH0.iG4Z0YYn7aP_UGTZnx-hYBOrxjTS0NsHi0SaYAraiy0";
const HEADERS={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates,return=minimal"};
const COLOR_MAP={"herlilbf 氓聦聟茅陇聤氓鹿鲁氓聫掳":"#db2777","猫聡陋氓禄潞氓聦聟茅陇聤莽露虏":"#db2777","盲禄聵猫虏禄茅聸禄氓颅聬氓聽卤":"#2563eb","莽路卢氓聸聽莽職聞忙拢庐忙聻聴":"#16a34a","盲赂颅忙聳聡氓聡潞莽聣聢猫篓聢氓聤聝":"#16a34a","莽鲁禄莽碌卤忙聲麓莽聬聠":"#d97706","茅聡聨忙聻聹莽露虏莽芦聶":"#7c3aed","忙聳聡氓颅赂氓聣碌盲陆聹":"#0891b2","忙聢虏氓聤聡茅聟聧忙篓聜":"#b45309","Cowork Todo List":"#78716c"};
const EXTRA=["#059669","#dc2626","#9333ea","#0284c7"];
let colorIdx=0;const ac={};
function getColor(p){return COLOR_MAP[p]||(ac[p]=ac[p]||EXTRA[colorIdx++%EXTRA.length]);}
const PRIORITY_LABELS=["芒聙聰","盲陆聨","盲赂颅","茅芦聵"];
const PRIORITY_BG=["#e7e5e4","#dbeafe","#fef3c7","#fee2e2"];
const PRIORITY_FG=["#a8a29e","#1d4ed8","#b45309","#dc2626"];
let allTodos=[],showDone=false,sortMode="none",minPriority=0;
document.querySelectorAll("[data-sort]").forEach(function(btn){btn.addEventListener("click",function(){sortMode=this.dataset.sort;document.querySelectorAll("[data-sort]").forEach(function(b){b.classList.remove("active");});this.classList.add("active");renderAll();});});
document.querySelectorAll("[data-min]").forEach(function(btn){btn.addEventListener("click",function(){minPriority=parseInt(this.dataset.min);document.querySelectorAll("[data-min]").forEach(function(b){b.classList.remove("active");});this.classList.add("active");renderAll();});});
async function loadData(){
  try{
    const res=await fetch(SUPABASE_URL+"/rest/v1/todos?select=*&order=project.asc,sort_order.asc,id.asc",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    const syncRow=data.find(function(t){return t.id==="__sync__";});
    if(syncRow&&syncRow.updated_at){const d=new Date(syncRow.updated_at);document.getElementById("subtitle").textContent="盲赂聤忙卢隆氓聬聦忙颅楼茂录職"+d.toLocaleDateString("zh-TW",{month:"long",day:"numeric"})+" "+d.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});}
    else{document.getElementById("subtitle").textContent="氓路虏猫录聣氓聟楼";}
    allTodos=data.filter(function(t){return t.id!=="__sync__"&&t.title;});
    renderAll();updateProgress();
    document.getElementById("toggle-done-btn").style.display="block";
    document.getElementById("filter-bar").style.display="flex";
  }catch(e){
    document.getElementById("subtitle").textContent="猫录聣氓聟楼氓陇卤忙聲聴";
    document.getElementById("error-area").innerHTML="<div class=\"error-msg\">莽聞隆忙鲁聲茅聙拢忙聨楼 Supabase茂录職"+e.message+"</div>";
    document.getElementById("todo-list").innerHTML="";
  }
}
async function markDone(id,isDone,btnEl){
  btnEl.disabled=true;
  try{const res=await fetch(SUPABASE_URL+"/rest/v1/todos",{method:"POST",headers:HEADERS,body:JSON.stringify({id:id,done:!isDone})});
  if(!res.ok)throw new Error("HTTP "+res.status);
  const t=allTodos.find(function(x){return x.id===id;});if(t)t.done=!isDone;
  renderAll();updateProgress();}catch(e){alert("忙聸麓忙聳掳氓陇卤忙聲聴茂录職"+e.message);btnEl.disabled=false;}
}
async function moveToBottom(id,project,btnEl){
  btnEl.disabled=true;
  try{const sp=allTodos.filter(function(t){return t.project===project&&!t.done;});
  const mx=Math.max.apply(null,[0].concat(sp.map(function(t){return t.sort_order||0;})));
  const res=await fetch(SUPABASE_URL+"/rest/v1/todos",{method:"POST",headers:HEADERS,body:JSON.stringify({id:id,sort_order:mx+1})});
  if(!res.ok)throw new Error("HTTP "+res.status);
  const t=allTodos.find(function(x){return x.id===id;});if(t)t.sort_order=mx+1;
  allTodos.sort(function(a,b){
    if(a.project!==b.project)return(a.project||"").localeCompare(b.project||"");
    var sa=(a.sort_order||0),sb=(b.sort_order||0);
    if(sa!==sb)return sa-sb;
    return(a.id||"").localeCompare(b.id||"");
  });
  renderAll();updateProgress();}catch(e){alert("忙聸麓忙聳掳氓陇卤忙聲聴茂录職"+e.message);btnEl.disabled=false;}
}
async function setPriority(id,value,selectEl){
  selectEl.disabled=true;
  try{const res=await fetch(SUPABASE_URL+"/rest/v1/todos",{method:"POST",headers:HEADERS,body:JSON.stringify({id:id,priority:value})});
  if(!res.ok)throw new Error("HTTP "+res.status);
  const t=allTodos.find(function(x){return x.id===id;});if(t)t.priority=value;
  renderAll();updateProgress();}catch(e){alert("忙聸麓忙聳掳氓陇卤忙聲聴茂录職"+e.message);}
  selectEl.disabled=false;
}
function toggleDone(){showDone=!showDone;document.getElementById("toggle-done-btn").textContent=showDone?"茅職卤猫聴聫氓路虏氓庐聦忙聢聬茅聽聟莽聸庐":"茅隆炉莽陇潞氓路虏氓庐聦忙聢聬茅聽聟莽聸庐";renderAll();}
function updateProgress(){
  const total=allTodos.length,done=allTodos.filter(function(t){return t.done;}).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("progress-fill").style.width=pct+"%";
  document.getElementById("progress-text").textContent=done+" / "+total+" 茅聽聟氓庐聦忙聢聬";
}
function renderAll(){
  const container=document.getElementById("todo-list");container.innerHTML="";
  let visible=showDone?allTodos.slice():allTodos.filter(function(t){return!t.done;});
  if(minPriority>0)visible=visible.filter(function(t){return(t.priority||0)>=minPriority;});
  if(sortMode==="desc")visible=visible.slice().sort(function(a,b){return(b.priority||0)-(a.priority||0);});
  else if(sortMode==="asc")visible=visible.slice().sort(function(a,b){return(a.priority||0)-(b.priority||0);});
  if(!visible.length){container.innerHTML="<div class=\"loading\">忙虏聮忙聹聣莽卢娄氓聬聢忙垄聺盲禄露莽職聞茅聽聟莽聸庐 冒聼聨聣</div>";return;}
  const groups={};
  if(sortMode!=="none"){groups[""]=visible;}
  else{visible.forEach(function(t){const p=t.project||"茂录聢忙聹陋氓聢聠茅隆聻茂录聣";if(!groups[p])groups[p]=[];groups[p].push(t);});}
  Object.keys(groups).forEach(function(project){
    const items=groups[project];
    const color=sortMode!=="none"?"#78716c":getColor(project);
    const groupEl=document.createElement("div");groupEl.className="project-group";
    if(project){const label=document.createElement("div");label.className="project-label";label.style.color=color;label.textContent=project;groupEl.appendChild(label);}
    items.forEach(function(item){
      const prio=item.priority||0;
      const card=document.createElement("div");card.className="todo-card"+(item.done?" done":"");
      const metaParts=[];
      if(item.url)metaParts.push("<a class=\"meta-link\" href=\""+item.url+"\" target=\"_blank\">冒聼聰聴 "+item.url.replace(/^https?:\/\//,"").split("/")[0]+"</a>");
      if(item.location)metaParts.push("<span class=\"meta-loc\">冒聼聯聧 "+item.location+"</span>");
      const ctxHtml=item.context?"<div class=\"context-text\"><p>"+item.context.split("\n\n").join("</p><p>").split("\n").join("<br>")+"</p></div>":"";
      const notesHtml=item.notes?"<div class=\"notes-wrap\">冒聼聯聺 "+item.notes+"</div>":"";
      const metaHtml=metaParts.length?"<div class=\"meta-row\">"+metaParts.join("")+"</div>":"";
      const badgeHtml=prio>0?"<span class=\"priority-badge\" style=\"background:"+PRIORITY_BG[prio]+";color:"+PRIORITY_FG[prio]+"\">"+PRIORITY_LABELS[prio]+"</span>":"";
      const opts=PRIORITY_LABELS.map(function(l,i){return"<option value=\""+i+"\""+(prio===i?" selected":"")+">"+( i===0?"芒聙聰 忙聹陋猫篓颅氓庐職":i+" "+l)+"</option>";}).join("");
      card.innerHTML=
        "<div class=\"todo-header\" data-toggle>"+
        "<div class=\"dot\" style=\"background:"+color+"\"></div>"+
        "<div class=\"todo-title\">"+item.title+"</div>"+
        badgeHtml+
        "<div class=\"chevron\">芒聳录</div>"+
        "</div>"+
        "<div class=\"todo-context\">"+
        (item.session_name?"<div class=\"session-tag\" style=\"background:"+color+"18;color:"+color+"\">"+item.session_name+"</div>":"")+
        ctxHtml+metaHtml+notesHtml+
        "<div class=\"btn-row\">"+
        "<button class=\"done-btn\" data-id=\""+item.id+"\" data-done=\""+(item.done?"1":"0")+"\">"+(item.done?"芒聠漏 氓聫聳忙露聢氓庐聦忙聢聬":"芒聹聯 忙篓聶莽聜潞氓庐聦忙聢聬")+"</button>"+
        "<button class=\"bottom-btn\" data-id=\""+item.id+"\" data-project=\""+item.project+"\">芒聠聯 莽搂禄氓聢掳忙聹聙盲赂聥忙聳鹿</button>"+
        "<div class=\"priority-wrap\"><label>茅聡聧猫娄聛忙聙搂</label>"+
        "<select class=\"priority-select\" data-id=\""+item.id+"\">"+opts+"</select></div>"+
        "</div></div>";
      card.querySelector("[data-toggle]").addEventListener("click",function(){this.parentElement.classList.toggle("open");});
      card.querySelector(".done-btn").addEventListener("click",function(e){e.stopPropagation();markDone(this.dataset.id,this.dataset.done==="1",this);});
      card.querySelector(".bottom-btn").addEventListener("click",function(e){e.stopPropagation();moveToBottom(this.dataset.id,this.dataset.project,this);});
      card.querySelector(".priority-select").addEventListener("change",function(e){e.stopPropagation();setPriority(this.dataset.id,parseInt(this.value),this);});
      groupEl.appendChild(card);
    });
    container.appendChild(groupEl);
  });
}
document.getElementById("toggle-done-btn").addEventListener("click",toggleDone);
loadData();
</script>
</body>
</html>
