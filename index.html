<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandin 的下一步</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f4; color: #1c1917; padding: 24px 16px; min-height: 100vh; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #78716c; margin-bottom: 12px; }
  .sync-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .sync-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #78716c; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #a8a29e; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .progress-label { font-size: 11px; color: #78716c; margin-bottom: 6px; }
  .progress-bar-wrap { background: #e7e5e4; border-radius: 99px; height: 4px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: #292524; transition: width 0.4s; }
  .project-group { margin-bottom: 20px; }
  .project-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #78716c; margin-bottom: 8px; padding-left: 4px; }
  .todo-card { background: #fff; border-radius: 10px; margin-bottom: 6px; border: 1px solid #e7e5e4; overflow: hidden; transition: box-shadow 0.15s; }
  .todo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .todo-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .todo-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.4; }
  .chevron { font-size: 12px; color: #a8a29e; transition: transform 0.2s; flex-shrink: 0; }
  .todo-card.open .chevron { transform: rotate(180deg); }
  .todo-context { display: none; padding: 12px 16px 14px 38px; font-size: 13px; color: #57534e; line-height: 1.6; border-top: 1px solid #f5f5f4; }
  .todo-card.open .todo-context { display: block; }
  .session-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .done-btn { margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: #78716c; background: #f5f5f4; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; transition: background 0.15s; }
  .done-btn:hover { background: #e7e5e4; color: #1c1917; }
  .done-btn:disabled { opacity: 0.5; cursor: default; }
  .todo-card.done { opacity: 0.45; }
  .todo-card.done .todo-title { text-decoration: line-through; color: #a8a29e; }
  .toggle-done-btn { font-size: 12px; color: #a8a29e; background: none; border: none; cursor: pointer; padding: 8px 0; display: block; margin: 4px auto 0; }
  .toggle-done-btn:hover { color: #78716c; }
  .empty { text-align: center; color: #a8a29e; font-size: 13px; padding: 40px 0; }
</style>
</head>
<body>
<h1>Brandin 的下一步</h1>
<p class="subtitle">每小時自動從 Cowork 對話更新</p>
<div class="sync-row">
  <div class="sync-status">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-label">載入中…</span>
  </div>
</div>
<div class="progress-label" id="progress-text"></div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
<div id="todo-list"></div>
<button class="toggle-done-btn" id="toggle-done-btn">顯示已完成項目</button>

<script>
const SB_URL = 'https://hwlbadvxnsppojaoqkeh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3bGJhZHZ4bnNwcG9qYW9xa2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzgyOTgsImV4cCI6MjA5NzQ1NDI5OH0.iG4Z0YYn7aP_UGTZnx-hYBOrxjTS0NsHi0SaYAraiy0';

const HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'resolution=merge-duplicates,return=minimal'
};

let todos = [];
let showDone = false;

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

async function loadTodos() {
  setSyncStatus('loading', '載入中…');
  try {
    const res = await fetch(SB_URL + '/rest/v1/todos?select=*&order=project,sort_order', { headers: HEADERS });
    if (!res.ok) throw new Error();
    todos = await res.json();
    setSyncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}));
    render();
  } catch(e) {
    setSyncStatus('error', '載入失敗');
  }
}

async function toggleDone(id, isDone) {
  setSyncStatus('loading', '儲存中…');
  try {
    await fetch(SB_URL + '/rest/v1/todos', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ id: id, done: isDone, updated_at: new Date().toISOString() })
    });
    const t = todos.find(function(t) { return t.id === id; });
    if (t) t.done = isDone;
    setSyncStatus('ok', '已儲存');
    render();
  } catch(e) {
    setSyncStatus('error', '儲存失敗');
  }
}

function toggleShowDone() {
  showDone = !showDone;
  document.getElementById('toggle-done-btn').textContent = showDone ? '隱藏已完成項目' : '顯示已完成項目';
  render();
}

function toggleCard(el) { el.classList.toggle('open'); }

function updateProgress() {
  const total = todos.length;
  const done = todos.filter(function(t) { return t.done; }).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' 項完成';
}

function buildCard(item, color) {
  const card = document.createElement('div');
  card.className = 'todo-card' + (item.done ? ' done' : '');

  const header = document.createElement('div');
  header.className = 'todo-header';
  header.onclick = function() { card.classList.toggle('open'); };

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.background = color;

  const titleEl = document.createElement('div');
  titleEl.className = 'todo-title';
  titleEl.textContent = item.title;

  const chev = document.createElement('div');
  chev.className = 'chevron';
  chev.textContent = '▼';

  header.appendChild(dot);
  header.appendChild(titleEl);
  header.appendChild(chev);

  const ctx = document.createElement('div');
  ctx.className = 'todo-context';

  const tag = document.createElement('div');
  tag.className = 'session-tag';
  tag.style.background = color + '18';
  tag.style.color = color;
  tag.textContent = item.session_name || '';

  const body = document.createElement('p');
  body.innerHTML = (item.context || '').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');

  const btn = document.createElement('button');
  btn.className = 'done-btn';
  btn.textContent = item.done ? '↩ 取消完成' : '✓ 標為完成';
  btn.onclick = function(e) {
    e.stopPropagation();
    btn.disabled = true;
    toggleDone(item.id, !item.done);
  };

  ctx.appendChild(tag);
  ctx.appendChild(body);
  ctx.appendChild(btn);

  card.appendChild(header);
  card.appendChild(ctx);
  return card;
}

function render() {
  updateProgress();
  const container = document.getElementById('todo-list');
  container.innerHTML = '';

  const groups = {};
  const projectColors = {};
  todos.forEach(function(t) {
    if (!groups[t.project]) { groups[t.project] = []; projectColors[t.project] = t.color; }
    groups[t.project].push(t);
  });

  let anyVisible = false;
  Object.keys(groups).forEach(function(project) {
    const items = groups[project];
    const visible = showDone ? items : items.filter(function(t) { return !t.done; });
    if (!visible.length) return;
    anyVisible = true;
    const color = projectColors[project];

    const groupEl = document.createElement('div');
    groupEl.className = 'project-group';

    const label = document.createElement('div');
    label.className = 'project-label';
    label.style.color = color;
    label.textContent = project;
    groupEl.appendChild(label);

    visible.forEach(function(item) {
      groupEl.appendChild(buildCard(item, color));
    });
    container.appendChild(groupEl);
  });

  if (!anyVisible) {
    container.innerHTML = '<div class="empty">🎉 所有項目都完成了！</div>';
  }
}

document.getElementById('toggle-done-btn').onclick = toggleShowDone;
loadTodos();
</script>
</body>
</html>
