<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandin 的下一步</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f4; color: #1c1917; padding: 24px 16px; min-height: 100vh; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #78716c; margin-bottom: 12px; }
  .sync-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .sync-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #78716c; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #a8a29e; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .progress-label { font-size: 11px; color: #78716c; margin-bottom: 6px; }
  .progress-bar-wrap { background: #e7e5e4; border-radius: 99px; height: 4px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: #292524; transition: width 0.4s; }
  .project-group { margin-bottom: 20px; }
  .project-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #78716c; margin-bottom: 8px; padding-left: 4px; }
  .todo-card { background: #fff; border-radius: 10px; margin-bottom: 6px; border: 1px solid #e7e5e4; overflow: hidden; transition: box-shadow 0.15s; }
  .todo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .todo-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .todo-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.4; }
  .open-link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer; text-decoration: none; flex-shrink: 0; transition: opacity 0.15s; white-space: nowrap; }
  .open-link-btn:hover { opacity: 0.75; }
  .chevron { font-size: 12px; color: #a8a29e; transition: transform 0.2s; flex-shrink: 0; }
  .todo-card.open .chevron { transform: rotate(180deg); }
  .todo-context { display: none; padding: 12px 16px 14px 38px; font-size: 13px; color: #57534e; line-height: 1.6; border-top: 1px solid #f5f5f4; }
  .todo-card.open .todo-context { display: block; }
  .session-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .done-btn { margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: #78716c; background: #f5f5f4; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; transition: background 0.15s; }
  .done-btn:hover { background: #e7e5e4; color: #1c1917; }
  .done-btn:disabled { opacity: 0.5; cursor: default; }
  .notes-wrap { margin-top: 12px; border-top: 1px solid #f0efee; padding-top: 10px; }
  .notes-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #a8a29e; margin-bottom: 5px; }
  .notes-ta { width: 100%; font-size: 12px; font-family: inherit; color: #1c1917; background: #fafaf9; border: 1px solid #e7e5e4; border-radius: 6px; padding: 7px 10px; resize: vertical; min-height: 56px; outline: none; transition: border-color 0.15s; box-sizing: border-box; }
  .notes-ta:focus { border-color: #a8a29e; }
  .notes-save { margin-top: 5px; font-size: 11px; font-weight: 500; color: #fff; background: #292524; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: opacity 0.15s; }
  .notes-save:hover { opacity: 0.8; }
  .notes-save:disabled { opacity: 0.4; cursor: default; }
  .notes-saved { font-size: 11px; color: #22c55e; margin-left: 6px; opacity: 0; transition: opacity 0.3s; }
  .notes-saved.show { opacity: 1; }
  .loc-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; border: none; cursor: pointer; flex-shrink: 0; background: #f5f5f4; color: #78716c; transition: background 0.15s, color 0.15s; user-select: none; }
  .loc-tag:hover { background: #e7e5e4; color: #292524; }
  .loc-tag.set { background: #292524; color: #fff; }
  .todo-card.done { opacity: 0.45; }
  .todo-card.done .todo-title { text-decoration: line-through; color: #a8a29e; }
  .toggle-done-btn { font-size: 12px; color: #a8a29e; background: none; border: none; cursor: pointer; padding: 8px 0; display: block; margin: 4px auto 0; }
  .toggle-done-btn:hover { color: #78716c; }
  .empty { text-align: center; color: #a8a29e; font-size: 13px; padding: 40px 0; }
</style>
</head>
<body>
<h1>Brandin 的下一步</h1>
<p class="subtitle">每小時自動從 Cowork 對話更新</p>
<div class="sync-row">
  <div class="sync-status">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-label">載入中…</span>
  </div>
</div>
<div class="progress-label" id="progress-text"></div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
<div id="todo-list"></div>
<button class="toggle-done-btn" id="toggle-done-btn">顯示已完成項目</button>

<script>
const SB_URL = 'https://hwlbadvxnsppojaoqkeh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3bGJhZHZ4bnNwcG9qYW9xa2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzgyOTgsImV4cCI6MjA5NzQ1NDI5OH0.iG4Z0YYn7aP_UGTZnx-hYBOrxjTS0NsHi0SaYAraiy0';

const HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'resolution=merge-duplicates,return=minimal'
};

let todos = [];
let showDone = false;

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

async function loadTodos() {
  setSyncStatus('loading', '載入中…');
  try {
    const res = await fetch(SB_URL + '/rest/v1/todos?select=*&order=project,sort_order', { headers: HEADERS });
    if (!res.ok) throw new Error();
    const all = await res.json();

    // 找 __sync__ 紀錄取得上次同步時間，其餘才是真正的 todos
    const syncRow = all.find(t => t.id === '__sync__');
    todos = all.filter(t => t.id !== '__sync__');

    if (syncRow && syncRow.updated_at) {
      const syncTime = new Date(syncRow.updated_at);
      const now = new Date();
      const diffMin = Math.round((now - syncTime) / 60000);
      let label;
      if (diffMin < 1) label = '剛剛同步';
      else if (diffMin < 60) label = diffMin + ' 分鐘前同步';
      else {
        const h = syncTime.getHours().toString().padStart(2,'0');
        const m = syncTime.getMinutes().toString().padStart(2,'0');
        label = '上次同步 ' + h + ':' + m;
      }
      setSyncStatus('ok', label);
    } else {
      setSyncStatus('ok', '已載入（尚無同步紀錄）');
    }
    render();
  } catch(e) {
    setSyncStatus('error', '載入失敗');
  }
}

async function toggleDone(id, isDone) {
  setSyncStatus('loading', '儲存中…');
  try {
    await fetch(SB_URL + '/rest/v1/todos', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ id: id, done: isDone, updated_at: new Date().toISOString() })
    });
    var t = todos.find(function(t) { return t.id === id; });
    if (t) t.done = isDone;
    setSyncStatus('ok', '已儲存');
    render();
  } catch(e) {
    setSyncStatus('error', '儲存失敗');
  }
}

const LOC_OPTIONS = ['', '桌面 Cowork', '手機', '紙本', '電話'];
const LOC_ICONS  = ['📍', '💻', '📱', '📄', '📞'];

async function cycleLocation(id, currentLoc, tagEl) {
  const idx = LOC_OPTIONS.indexOf(currentLoc);
  const next = LOC_OPTIONS[(idx + 1) % LOC_OPTIONS.length];
  tagEl.textContent = next ? LOC_ICONS[LOC_OPTIONS.indexOf(next)] + ' ' + next : '📍 場所';
  tagEl.className = 'loc-tag' + (next ? ' set' : '');
  var t = todos.find(function(t) { return t.id === id; });
  if (t) t.location = next;
  try {
    await fetch(SB_URL + '/rest/v1/todos', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ id: id, location: next, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

async function saveNotes(id, notes, btn, savedMsg) {
  try {
    await fetch(SB_URL + '/rest/v1/todos', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ id: id, notes: notes, updated_at: new Date().toISOString() })
    });
    var t = todos.find(function(t) { return t.id === id; });
    if (t) t.notes = notes;
    savedMsg.classList.add('show');
    setTimeout(function() { savedMsg.classList.remove('show'); }, 2000);
  } catch(e) {
    savedMsg.textContent = '✗ 儲存失敗';
    savedMsg.classList.add('show');
  }
  btn.disabled = false;
}

function toggleShowDone() {
  showDone = !showDone;
  document.getElementById('toggle-done-btn').textContent = showDone ? '隱藏已完成項目' : '顯示已完成項目';
  render();
}

function toggleCard(el) { el.classList.toggle('open'); }

function updateProgress() {
  var total = todos.length;
  var done = todos.filter(function(t) { return t.done; }).length;
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' 項完成';
}

function buildCard(item, color) {
  var card = document.createElement('div');
  card.className = 'todo-card' + (item.done ? ' done' : '');

  var header = document.createElement('div');
  header.className = 'todo-header';
  header.onclick = function() { card.classList.toggle('open'); };

  var dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.background = color;

  var titleEl = document.createElement('div');
  titleEl.className = 'todo-title';
  titleEl.textContent = item.title;

  header.appendChild(dot);
  header.appendChild(titleEl);

  if (item.url) {
    var link = document.createElement('a');
    link.className = 'open-link-btn';
    link.href = item.url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.style.background = color + '18';
    link.style.color = color;
    link.textContent = '開啟 ↗';
    link.onclick = function(e) { e.stopPropagation(); };
    header.appendChild(link);
  } else {
    var locTag = document.createElement('button');
    var locVal = item.location || '';
    var locIdx = LOC_OPTIONS.indexOf(locVal);
    locTag.className = 'loc-tag' + (locVal ? ' set' : '');
    locTag.textContent = locVal ? (LOC_ICONS[locIdx] + ' ' + locVal) : '📍 場所';
    locTag.onclick = function(e) {
      e.stopPropagation();
      cycleLocation(item.id, item.location || '', locTag);
    };
    header.appendChild(locTag);
  }

  var chev = document.createElement('div');
  chev.className = 'chevron';
  chev.textContent = '▼';
  header.appendChild(chev);

  var ctx = document.createElement('div');
  ctx.className = 'todo-context';

  var tag = document.createElement('div');
  tag.className = 'session-tag';
  tag.style.background = color + '18';
  tag.style.color = color;
  tag.textContent = item.session_name || '';

  var bodyP = document.createElement('p');
  bodyP.innerHTML = (item.context || '').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');

  var btn = document.createElement('button');
  btn.className = 'done-btn';
  btn.textContent = item.done ? '↩ 取消完成' : '✓ 標為完成';
  btn.onclick = function(e) {
    e.stopPropagation();
    btn.disabled = true;
    toggleDone(item.id, !item.done);
  };

  // Notes section
  var notesWrap = document.createElement('div');
  notesWrap.className = 'notes-wrap';

  var notesLabel = document.createElement('div');
  notesLabel.className = 'notes-label';
  notesLabel.textContent = '📝 手機備忘';

  var notesTa = document.createElement('textarea');
  notesTa.className = 'notes-ta';
  notesTa.placeholder = '在手機上記錄處理結果或下一步提示…';
  notesTa.value = item.notes || '';
  notesTa.onclick = function(e) { e.stopPropagation(); };

  var notesRow = document.createElement('div');
  notesRow.style.display = 'flex';
  notesRow.style.alignItems = 'center';

  var saveBtn = document.createElement('button');
  saveBtn.className = 'notes-save';
  saveBtn.textContent = '儲存備忘';

  var savedMsg = document.createElement('span');
  savedMsg.className = 'notes-saved';
  savedMsg.textContent = '✓ 已儲存';

  saveBtn.onclick = function(e) {
    e.stopPropagation();
    saveBtn.disabled = true;
    saveNotes(item.id, notesTa.value, saveBtn, savedMsg);
  };

  notesRow.appendChild(saveBtn);
  notesRow.appendChild(savedMsg);
  notesWrap.appendChild(notesLabel);
  notesWrap.appendChild(notesTa);
  notesWrap.appendChild(notesRow);

  ctx.appendChild(tag);
  ctx.appendChild(bodyP);
  ctx.appendChild(btn);
  ctx.appendChild(notesWrap);
  card.appendChild(header);
  card.appendChild(ctx);
  return card;
}

function render() {
  updateProgress();
  var container = document.getElementById('todo-list');
  container.innerHTML = '';

  var groups = {};
  var projectColors = {};
  todos.forEach(function(t) {
    if (!groups[t.project]) { groups[t.project] = []; projectColors[t.project] = t.color; }
    groups[t.project].push(t);
  });

  var anyVisible = false;
  Object.keys(groups).forEach(function(project) {
    var items = groups[project];
    var color = projectColors[project];
    var visible = showDone ? items : items.filter(function(t) { return !t.done; });
    if (!visible.length) return;
    anyVisible = true;

    var groupEl = document.createElement('div');
    groupEl.className = 'project-group';

    var lbl = document.createElement('div');
    lbl.className = 'project-label';
    lbl.style.color = color;
    lbl.textContent = project;
    groupEl.appendChild(lbl);

    visible.forEach(function(item) {
      groupEl.appendChild(buildCard(item, color));
    });
    container.appendChild(groupEl);
  });

  if (!anyVisible) {
    container.innerHTML = '<div class="empty">🎉 所有項目都完成了！</div>';
  }
}

document.getElementById('toggle-done-btn').onclick = toggleShowDone;
loadTodos();
</script>
</body>
</html>
