<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f4;
    color: #1c1917;
    padding: 24px 16px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #78716c; margin-bottom: 20px; }
  .sync-status {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: #78716c;
    margin-bottom: 20px;
  }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #a8a29e; flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .progress-label { font-size: 11px; color: #78716c; margin-bottom: 6px; }
  .progress-bar-wrap { background: #e7e5e4; border-radius: 99px; height: 4px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: #292524; transition: width 0.4s; }
  .project-group { margin-bottom: 20px; }
  .project-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: #78716c; margin-bottom: 8px; padding-left: 4px;
  }
  .todo-card {
    background: #fff; border-radius: 10px; margin-bottom: 6px;
    border: 1px solid #e7e5e4; overflow: hidden; transition: box-shadow 0.15s;
  }
  .todo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .todo-header {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; cursor: pointer; user-select: none;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .todo-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.4; }
  .chevron { font-size: 12px; color: #a8a29e; transition: transform 0.2s; flex-shrink: 0; }
  .todo-card.open .chevron { transform: rotate(180deg); }
  .todo-context {
    display: none; padding: 12px 16px 14px 38px;
    font-size: 13px; color: #57534e; line-height: 1.6;
    border-top: 1px solid #f5f5f4;
  }
  .todo-card.open .todo-context { display: block; }
  .session-tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 99px; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .done-btn {
    margin-top: 12px; display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: #78716c;
    background: #f5f5f4; border: none; border-radius: 6px;
    padding: 5px 10px; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .done-btn:hover { background: #e7e5e4; color: #1c1917; }
  .done-btn:disabled { opacity: 0.5; cursor: default; }
  .todo-card.done { opacity: 0.45; }
  .todo-card.done .todo-title { text-decoration: line-through; color: #a8a29e; }
  .show-done-btn {
    font-size: 12px; color: #a8a29e; background: none;
    border: none; cursor: pointer; padding: 8px 0; display: block; margin: 0 auto;
  }
  .show-done-btn:hover { color: #78716c; }
  .meta-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .sync-status { margin-bottom: 0; }
  .fetch-time { font-size: 11px; color: #a8a29e; }
  .empty-state {
    text-align: center; padding: 40px 16px;
    font-size: 13px; color: #a8a29e;
  }
  .empty-state .emoji { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { margin-top: 4px; }
</style>
</head>

<script>

      }
    ]
  },
  {
    project: "戲劇配樂",
    color: "#b45309",
    sessionName: "Drama soundtrack composition",

      }

// --- Supabase helpers ---
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...opts.headers
    },
    ...opts
  });
  return res;
}

async function loadDoneState() {
  setSyncStatus('loading', '同步中…');
  try {
    const res = await sbFetch('todos?done=eq.true&select=id');
    if (!res.ok) throw new Error('fetch failed');
    const rows = await res.json();
    doneIds = new Set(rows.map(r => r.id));
    setSyncStatus('ok', '已同步');
    renderAll();
    updateProgress();
  } catch(e) {
    setSyncStatus('error', '同步失敗，使用本機資料');
    doneIds = new Set(JSON.parse(localStorage.getItem('todo-done') || '[]'));
    renderAll();
    updateProgress();
  }
}

async function upsertDone(id, done) {
  setSyncStatus('loading', '儲存中…');
  try {
    await sbFetch('todos', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id, done, updated_at: new Date().toISOString() })
    });
    setSyncStatus('ok', '已儲存');
    localStorage.setItem('todo-done', JSON.stringify([...doneIds]));
  } catch(e) {
    setSyncStatus('error', '儲存失敗');
    localStorage.setItem('todo-done', JSON.stringify([...doneIds]));
  }
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

// --- State ---
let doneIds = new Set();
let showDone = false;

function toggleDone() {
  showDone = !showDone;
  document.getElementById('toggle-done-btn').textContent = showDone ? '隱藏已完成項目' : '顯示已完成項目';
  renderAll();
}

async function markDone(id, el) {
  el.disabled = true;
  const nowDone = !doneIds.has(id);
  if (nowDone) doneIds.add(id); else doneIds.delete(id);
  await upsertDone(id, nowDone);
  renderAll();
  updateProgress();
}

function updateProgress() {
  const total = todos.reduce((s, g) => s + g.items.length, 0);
  const done = todos.reduce((s, g) => s + g.items.filter(i => doneIds.has(i.id)).length, 0);
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} 項完成`;
}

function toggleCard(cardEl) { cardEl.classList.toggle('open'); }

function renderAll() {
  const container = document.getElementById('todo-list');
  container.innerHTML = '';
  const allDone = todos.every(g => g.items.every(i => doneIds.has(i.id)));
  if (allDone && !showDone) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">🎉</div><strong>全部完成！</strong><p>點下方按鈕查看已完成項目</p></div>';
    return;
  }
  todos.forEach(group => {
    const visibleItems = showDone ? group.items : group.items.filter(i => !doneIds.has(i.id));
    if (visibleItems.length === 0) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'project-group';
    const label = document.createElement('div');
    label.className = 'project-label';
    label.style.color = group.color;
    label.textContent = group.project;
    groupEl.appendChild(label);
    visibleItems.forEach(item => {
      const isDone = doneIds.has(item.id);
      const card = document.createElement('div');
      card.className = 'todo-card' + (isDone ? ' done' : '');
      card.innerHTML = `
        <div class="todo-header" onclick="toggleCard(this.parentElement)">
          <div class="dot" style="background:${group.color}"></div>
          <div class="todo-title">${item.title}</div>
          <div class="chevron">▼</div>
        </div>
        <div class="todo-context">
          <div class="session-tag" style="background:${group.color}18;color:${group.color}">${group.sessionName}</div>
          <p>${item.context.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</p>
          <button class="done-btn" onclick="event.stopPropagation(); markDone('${item.id}', this)">
            ${isDone ? '↩ 取消完成' : '✓ 標為完成'}
          </button>
        </div>`;
      groupEl.appendChild(card);
    });
    container.appendChild(groupEl);
  });
}

document.getElementById('fetch-time-label').textContent =
  '上次 Claude 整理：' + new Date(LAST_CLAUDE_FETCH).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
loadDoneState();
</script>
